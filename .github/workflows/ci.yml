name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

# Cancel older runs on the same ref so PR pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ══════════════════════════════════════════════════════════════════
  # Job 1 — Python: lint + offline validators + pytest
  # ══════════════════════════════════════════════════════════════════
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: ai_bridge
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: ai_bridge/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check app scripts tests

      - name: Offline validator (module wiring, mock LLM, storage, winrate)
        env:
          LLM_MOCK_MODE: "true"
          MINIMAX_API_KEY: ""
          WEBHOOK_SECRET: "ci-test-secret"
        run: python scripts/_offline_validate.py

      - name: Offline backtest simulator check (stdlib only)
        run: python scripts/_offline_backtest_check.py

      - name: Pytest
        env:
          LLM_MOCK_MODE: "true"
          MINIMAX_API_KEY: ""
          WEBHOOK_SECRET: "ci-test-secret"
        run: pytest -q

  # ══════════════════════════════════════════════════════════════════
  # Job 2 — Docker: build the production image
  # ══════════════════════════════════════════════════════════════════
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ai_bridge image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ai_bridge
          file: ai_bridge/docker/Dockerfile
          push: false
          load: true
          tags: smartgold-ai-bridge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the built image
        env:
          WEBHOOK_SECRET: ci-test-secret
          LLM_MOCK_MODE: "true"
        run: |
          docker run -d --name sga_ci \
            -p 127.0.0.1:8080:8080 \
            -e WEBHOOK_SECRET \
            -e LLM_MOCK_MODE \
            -e ENABLE_MACRO_CONTEXT=false \
            smartgold-ai-bridge:ci

          # Wait for /health up to ~30s
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
              echo "healthcheck ok after ${i} attempts"
              break
            fi
            sleep 2
          done
          curl -sS http://127.0.0.1:8080/health | python3 -m json.tool

          # Hit the webhook with a valid sample payload
          python3 ai_bridge/scripts/smoke_test.py \
            --url http://127.0.0.1:8080 \
            --secret "$WEBHOOK_SECRET"

      - name: Dump container logs (always)
        if: always()
        run: docker logs sga_ci || true

      - name: Tear down
        if: always()
        run: docker rm -f sga_ci || true

  # ══════════════════════════════════════════════════════════════════
  # Job 3 — JS / static assets: lint + syntax check the dashboard
  # ══════════════════════════════════════════════════════════════════
  frontend:
    name: Dashboard static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check dashboard JS
        run: node --check ai_bridge/app/ui/app.js

      - name: HTML smoke parse (Python stdlib)
        run: |
          python3 -c "
          import html.parser, sys
          p = html.parser.HTMLParser()
          p.feed(open('ai_bridge/app/ui/index.html').read())
          print('HTML parser: OK')
          "
